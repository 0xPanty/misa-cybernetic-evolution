<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Misa Cybernetic Evolution Layer control loop</title>
  <desc id="desc">A system diagram showing evidence intake, the Qianxuesen control layer, draft outputs, and the human approval boundary.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L12 7 L2 12 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 42px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 400 22px Arial, Helvetica, sans-serif; fill: #475569; }
      .lane-title { font: 700 21px Arial, Helvetica, sans-serif; }
      .lane-subtitle { font: 400 17px Arial, Helvetica, sans-serif; fill: #475569; }
      .card-title { font: 700 24px Arial, Helvetica, sans-serif; fill: #111827; }
      .card-text { font: 400 17px Arial, Helvetica, sans-serif; fill: #475569; }
      .small-title { font: 700 21px Arial, Helvetica, sans-serif; fill: #111827; }
      .small-text { font: 400 16px Arial, Helvetica, sans-serif; fill: #475569; }
      .blocked-title { font: 700 21px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .blocked-item { font: 700 17px Arial, Helvetica, sans-serif; fill: #fef2f2; }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>

  <text x="80" y="78" class="title">Misa Cybernetic Evolution Layer</text>
  <text x="82" y="116" class="subtitle">A local control-theoretic sidecar: evidence in, safe drafts out, human boundary preserved.</text>

  <rect x="70" y="145" width="1460" height="132" rx="18" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <text x="96" y="183" class="lane-title" fill="#0369a1">INPUT AND CARRIER LAYER</text>
  <text x="96" y="213" class="lane-subtitle">LangGraph may carry state, checkpoints, interrupts, and resume traces. It does not own learning routes.</text>

  <g filter="url(#shadow)">
    <rect x="1195" y="158" width="280" height="94" rx="14" fill="#ffffff" stroke="#0369a1" stroke-width="2"/>
    <text x="1215" y="194" class="small-title">Carrier tools</text>
    <text x="1215" y="225" class="small-text">state, checkpoint, interrupt, resume</text>
  </g>

  <rect x="70" y="315" width="1460" height="205" rx="18" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
  <text x="96" y="353" class="lane-title" fill="#047857">QIANXUESEN CONTROL LAYER</text>
  <text x="96" y="383" class="lane-subtitle">Deterministic route authority lives here: distill, split, route, gate, compare, and keep live effects off.</text>

  <g filter="url(#shadow)">
    <rect x="96" y="360" width="188" height="116" rx="14" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="118" y="398" class="card-title">Evidence</text>
    <text x="118" y="428" class="card-text">redacted runs,</text>
    <text x="118" y="452" class="card-text">Hermes refs, audits</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="360" width="208" height="116" rx="14" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
    <text x="352" y="398" class="card-title">Distill + Map</text>
    <text x="352" y="428" class="card-text">segments, signals,</text>
    <text x="352" y="452" class="card-text">local token refs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="586" y="360" width="228" height="116" rx="14" fill="#ffffff" stroke="#059669" stroke-width="2"/>
    <text x="608" y="398" class="card-title">Route Table</text>
    <text x="608" y="428" class="card-text">memory / skill / case</text>
    <text x="608" y="452" class="card-text">policy / damping</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="862" y="360" width="238" height="116" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="884" y="398" class="card-title">Candidate Gates</text>
    <text x="884" y="428" class="card-text">minimal L3, preflight,</text>
    <text x="884" y="452" class="card-text">repair tickets</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1148" y="360" width="238" height="116" rx="14" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
    <text x="1170" y="398" class="card-title">Tournament</text>
    <text x="1170" y="428" class="card-text">strategy_fit +</text>
    <text x="1170" y="452" class="card-text">llm_review_value</text>
  </g>

  <path class="arrow" d="M292 418 H322"/>
  <path class="arrow" d="M548 418 H578"/>
  <path class="arrow" d="M824 418 H854"/>
  <path class="arrow" d="M1110 418 H1140"/>

  <rect x="70" y="575" width="1460" height="178" rx="18" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
  <text x="96" y="613" class="lane-title" fill="#c2410c">OUTPUT AND HUMAN BOUNDARY</text>
  <text x="96" y="643" class="lane-subtitle">Outputs are local drafts or handoff packets until a human explicitly approves a durable or public effect.</text>

  <g filter="url(#shadow)">
    <rect x="210" y="630" width="210" height="116" rx="14" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
    <text x="232" y="668" class="card-title">Draft Skill</text>
    <text x="232" y="699" class="card-text">local file only</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="480" y="630" width="210" height="116" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="502" y="668" class="card-title">Repair Ticket</text>
    <text x="502" y="699" class="card-text">Codex work queue</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="750" y="630" width="210" height="116" rx="14" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
    <text x="772" y="668" class="card-title">Work Order</text>
    <text x="772" y="699" class="card-text">primary-agent</text>
    <text x="772" y="723" class="card-text">handoff</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1020" y="630" width="210" height="116" rx="14" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="1042" y="668" class="card-title">Human Boundary</text>
    <text x="1042" y="699" class="card-text">approve / hold</text>
    <text x="1042" y="723" class="card-text">or reject</text>
  </g>

  <path class="arrow" d="M430 688 H470"/>
  <path class="arrow" d="M700 688 H740"/>
  <path class="arrow" d="M970 688 H1010"/>

  <rect x="90" y="775" width="1410" height="70" rx="18" fill="#111827"/>
  <text x="120" y="818" class="blocked-title">Blocked by default</text>
  <text x="360" y="818" class="blocked-item">memory writes</text>
  <text x="535" y="818" class="blocked-item">Skill install</text>
  <text x="690" y="818" class="blocked-item">provider routes</text>
  <text x="880" y="818" class="blocked-item">timers/services</text>
  <text x="1085" y="818" class="blocked-item">public posts</text>
  <text x="1250" y="818" class="blocked-item">VPS updates</text>
</svg>
